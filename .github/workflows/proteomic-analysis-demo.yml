name: Proteomic analysis demo

on:
  push:
  pull_request:

jobs:
  demo:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.1"

      - name: Run stale-label audit
        run: Rscript proteomic_analysis/tests/check_stale_labels.R

      - name: Run comparison parser tests
        run: Rscript proteomic_analysis/tests/test_gct_comparison_parser.R

      - name: Run demo
        run: Rscript proteomic_analysis/run_demo.R
